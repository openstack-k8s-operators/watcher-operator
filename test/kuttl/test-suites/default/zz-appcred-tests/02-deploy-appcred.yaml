apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -euo pipefail
      NS="${NAMESPACE}"

      old_api_uid=$(oc get pod -n "${NS}" watcher-kuttl-api-0 -o jsonpath='{.metadata.uid}')
      old_applier_uid=$(oc get pod -n "${NS}" watcher-kuttl-applier-0 -o jsonpath='{.metadata.uid}')
      old_de_uid=$(oc get pod -n "${NS}" watcher-kuttl-decision-engine-0 -o jsonpath='{.metadata.uid}')
      oc create configmap appcred-watcher-pre \
        --from-literal=api_uid="${old_api_uid}" \
        --from-literal=applier_uid="${old_applier_uid}" \
        --from-literal=decision_engine_uid="${old_de_uid}" \
        --dry-run=client -o yaml | oc apply -n "${NS}" -f -

      cat <<'EOF' | oc apply -n "${NS}" -f -
      apiVersion: keystone.openstack.org/v1beta1
      kind: KeystoneApplicationCredential
      metadata:
        name: ac-watcher-test
      spec:
        secret: osp-secret
        passwordSelector: WatcherPassword
        userName: watcher
        roles:
          - admin
          - service
        unrestricted: false
      EOF

      echo "Waiting for KeystoneApplicationCredential ac-watcher-test to be Ready..."
      oc wait -n "${NS}" appcred/ac-watcher-test --for=condition=Ready --timeout=300s

      ac_secret_name=$(oc get -n "${NS}" appcred/ac-watcher-test -o jsonpath='{.status.secretName}')
      if [ -z "${ac_secret_name}" ]; then
        echo "ERROR: appcred/ac-watcher-test.status.secretName is empty"
        exit 1
      fi
      echo "AC secret name: ${ac_secret_name}"

      oc patch watcher watcher-kuttl -n "${NS}" --type=merge -p "{\"spec\":{\"auth\":{\"applicationCredentialSecret\":\"${ac_secret_name}\"}}}"
