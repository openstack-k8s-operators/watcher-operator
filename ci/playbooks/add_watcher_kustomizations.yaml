# This hook is used to add kustomizations to cifmw_edpm_prepare_kustomizations var

- name: Add watcher kustomizations objects
  hosts: "{{ cifmw_target_hook_host | default('localhost') }}"
  gather_facts: false
  tasks:
    - name: Set default Kustomization objects for cifmw_edpm_prepare_kustomizations
      set_fact:
        cifmw_edpm_prepare_kustomizations:
          - apiVersion: kustomize.config.k8s.io/v1beta1
            kind: Kustomization
            namespace: openstack
            patches:
              - patch: |-
                  apiVersion: core.openstack.org/v1beta1
                  kind: OpenStackControlPlane
                  metadata:
                    name: controlplane
                  spec:
                    telemetry:
                      enabled: true
                      template:
                        ceilometer:
                          enabled: true
                        metricStorage:
                          enabled: true
                          customMonitoringStack:
                            alertmanagerConfig:
                              disabled: true
                            prometheusConfig:
                              enableRemoteWriteReceiver: true
                              persistentVolumeClaim:
                                resources:
                                  requests:
                                    storage: 20G
                              replicas: 1
                              scrapeInterval: 30s
                            resourceSelector:
                              matchLabels:
                                service: metricStorage
                            retention: 24h
                target:
                  kind: OpenStackControlPlane
              - patch: |-
                  apiVersion: core.openstack.org/v1beta1
                  kind: OpenStackControlPlane
                  metadata:
                    name: controlplane
                  spec:
                    telemetry:
                      template:
                        metricStorage:
                          monitoringStack: null
                target:
                  kind: OpenStackControlPlane
              - patch: |-
                  apiVersion: core.openstack.org/v1beta1
                  kind: OpenStackControlPlane
                  metadata:
                    name: controlplane
                  spec:
                    nova:
                      template:
                        notificationsBusInstance: rabbitmq-notifications
                target:
                  kind: OpenStackControlPlane
              - patch: |-
                  apiVersion: core.openstack.org/v1beta1
                  kind: OpenStackControlPlane
                  metadata:
                    name: controlplane
                  spec:
                    rabbitmq:
                      templates:
                        rabbitmq-notifications:
                          delayStartSeconds: 30
                          override:
                            service:
                              metadata:
                                annotations:
                                  metallb.universe.tf/address-pool: internalapi
                                  metallb.universe.tf/loadBalancerIPs: 172.17.0.87
                              spec:
                                type: LoadBalancer
                target:
                  kind: OpenStackControlPlane
              - patch: |-
                  apiVersion: core.openstack.org/v1beta1
                  kind: OpenStackControlPlane
                  metadata:
                    name: controlplane
                  spec:
                    watcher:
                      enabled: true
                      template:
                        notificationsBusInstance: rabbitmq-notifications
                target:
                  kind: OpenStackControlPlane

    - name: Disable nova notifications if not needed
      vars:
        extra_kustomization_object:
          - apiVersion: kustomize.config.k8s.io/v1beta1
            kind: Kustomization
            namespace: openstack
            patches:
              - patch: |-
                  apiVersion: core.openstack.org/v1beta1
                  kind: OpenStackControlPlane
                  metadata:
                    name: controlplane
                  spec:
                    nova:
                      template:
                        notificationsBusInstance: null
              - patch: |-
                  apiVersion: core.openstack.org/v1beta1
                  kind: OpenStackControlPlane
                  metadata:
                    name: controlplane
                  spec:
                    rabbitmq:
                      templates:
                        rabbitmq-notifications: null
                target:
                  kind: OpenStackControlPlane
              - patch : |-
                  apiVersion: core.openstack.org/v1beta1
                  kind: OpenStackControlPlane
                  metadata:
                    name: controlplane
                  spec:
                    watcher:
                      template:
                        notificationsBusInstance: null
                target:
                  kind: OpenStackControlPlane
      set_fact:
        cifmw_edpm_prepare_kustomizations: "{{ cifmw_edpm_prepare_kustomizations + extra_kustomization_object }}"
      when: watcher_uses_notifications | default(true) | bool
